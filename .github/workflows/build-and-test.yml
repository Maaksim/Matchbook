name: Matchbook CI

on:
  pull_request:
    branches:
      - develop
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build and test
    runs-on: macos-15
    env:
      SCHEME: Matchbook
      PROJECT: Matchbook.xcodeproj

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Resolve Swift packages
        run: xcodebuild -resolvePackageDependencies -project "$PROJECT" -scheme "$SCHEME"

      - name: Pick an iOS Simulator
        id: sim
        run: |
          # Grab the UDID of the first available iPhone simulator so we don't
          # depend on a specific device model being pre-installed on the runner.
          udid=$(xcrun simctl list devices available \
            | grep -E 'iPhone' \
            | grep -oE '[0-9A-F]{8}-([0-9A-F]{4}-){3}[0-9A-F]{12}' \
            | head -1)
          if [ -z "$udid" ]; then
            echo "No available iPhone simulator found" >&2
            xcrun simctl list devices available >&2
            exit 1
          fi
          echo "Using simulator UDID: $udid"
          echo "udid=$udid" >> "$GITHUB_OUTPUT"

      - name: Build for testing
        run: |
          set -o pipefail
          fmt=$(command -v xcbeautify || echo cat)
          xcodebuild build-for-testing \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -destination "platform=iOS Simulator,id=${{ steps.sim.outputs.udid }}" \
            CODE_SIGNING_ALLOWED=NO \
            | "$fmt"

      - name: Test
        run: |
          set -o pipefail
          fmt=$(command -v xcbeautify || echo cat)
          xcodebuild test-without-building \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -destination "platform=iOS Simulator,id=${{ steps.sim.outputs.udid }}" \
            CODE_SIGNING_ALLOWED=NO \
            | "$fmt"
