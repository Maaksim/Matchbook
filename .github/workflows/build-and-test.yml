name: Matchbook CI

on:
  pull_request:
    branches:
      - develop
      - main

jobs:
  test:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.0"

      - name: Resolve Packages
        run: xcodebuild -resolvePackageDependencies

      - name: Build & Test
        run: |
          xcodebuild test \
            -scheme Matchbook \
            -destination 'platform=iOS Simulator,name=iPhone 17'
